<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Custom QR Generator | By FR3NEWERA</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrious/4.0.2/qrious.min.js"></script>
    <style>
        body {
            display: flex;
            flex-direction: column;
            align-items: center;
            background-color: #1a1b20;
            color: white;
            font-family: sans-serif;
            margin: 0;
            padding: 20px;
        }
        canvas {
            max-width: 100%;
            height: auto;
            border-radius: 10px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.5);
            margin-top: 20px;
        }
        .url-info {
            background: #2a2b30;
            padding: 10px;
            border-radius: 5px;
            margin-top: 20px;
            word-break: break-all;
        }
    </style>
</head>
<body>

    <h2>QRIS Generator Visualizer</h2>
    <p>Ubah parameter URL di atas untuk melihat hasilnya.</p>
    
    <canvas id="qrCanvas"></canvas>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const qrData = urlParams.get('qrcode') || 'https://qris-generator.fr3newera.com';
        const nama = urlParams.get('name') || 'Toko Default';

        const canvas = document.getElementById('qrCanvas');
        const ctx = canvas.getContext('2d');
        const backgroundImg = new Image();
        backgroundImg.src = 'baseqr.jpg'; 
        
        backgroundImg.onload = () => {
            canvas.width = backgroundImg.width;
            canvas.height = backgroundImg.height;
            ctx.drawImage(backgroundImg, 0, 0);
            const qr = new QRious({
                value: qrData,
                size: 600,
                level: 'H',
                background: 'white',
                foreground: 'black'
            });

            const qrImg = new Image();
            qrImg.src = qr.toDataURL();
            qrImg.onload = () => {
              const qrX = (canvas.width - qr.size) / 2;
                const qrY = 340;
                ctx.drawImage(qrImg, qrX, qrY);
                ctx.font = '500 35px "Segoe UI", Arial, sans-serif';
                ctx.fillStyle = '#FFFFFF';
                ctx.textAlign = 'center';
                const textX = canvas.width / 2;
                const textY = canvas.height - 20;
                ctx.fillText(`${nama}`, textX, textY);
            };
        };
    </script>
</body>
</html>
