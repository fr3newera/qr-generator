<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Custom QRIS Generator | By FR3 NEWERA</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrious/4.0.2/qrious.min.js"></script>
    <style>
        body {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: white;
            background: linear-gradient(-45deg, #0f172a, #1e293b, #000000, #334155);
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
            box-sizing: border-box;
        }

        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        h2 {
            margin-bottom: 5px;
            text-align: center;
            text-shadow: 0 2px 4px rgba(0,0,0,0.5);
            letter-spacing: 1px;
        }

        p {
            margin-bottom: 30px;
            color: #cbd5e1;
            text-align: center;
            font-size: 14px;
        }

        canvas {
            max-width: 100%;
            width: 380px;
            height: auto;
            border-radius: 15px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.6);
            transition: transform 0.15s ease, box-shadow 0.15s ease;
            cursor: pointer;
            -webkit-tap-highlight-color: transparent;
        }

        canvas:active {
            transform: scale(0.96);
            box-shadow: 0 5px 15px rgba(0,0,0,0.4);
        }

        .button-group {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-top: 30px;
            width: 100%;
            max-width: 380px;
        }

        .button-row {
            display: flex;
            gap: 12px;
            width: 100%;
        }

        .btn {
            flex: 1;
            padding: 14px 20px;
            border: none;
            border-radius: 10px;
            font-size: 14px;
            font-weight: 600;
            text-align: center;
            text-decoration: none;
            cursor: pointer;
            transition: all 0.3s ease;
            box-sizing: border-box;
        }

        .btn:active {
            transform: translateY(3px);
        }

        .btn-download {
            background-color: #2563eb;
            color: white;
            box-shadow: 0 4px 15px rgba(37, 99, 235, 0.4);
            width: 100%;
        }
        .btn-download:hover {
            background-color: #1d4ed8;
        }

        .btn-outline {
            background-color: rgba(255, 255, 255, 0.05);
            border: 1px solid #475569;
            color: #e2e8f0;
            backdrop-filter: blur(5px);
        }
        .btn-outline:hover {
            border-color: #94a3b8;
            background-color: rgba(255, 255, 255, 0.1);
        }

        .footer {
            margin-top: 50px;
            font-size: 13px;
            color: #64748b;
            text-align: center;
            letter-spacing: 0.5px;
        }
        
        .footer span {
            color: #60a5fa;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <h2>QRIS Generator Visualizer</h2>
    <p>Ubah parameter URL di atas untuk melihat hasilnya.</p>
    
    <canvas id="qrCanvas" title="Tekan/Klik gambar untuk melihat efek responsif"></canvas>

    <div class="button-group">
        <button class="btn btn-download" id="downloadBtn">⬇ Download QRIS</button>
        
        <div class="button-row">
            <a href="https://github.com/fr3newera/qr-generator/" class="btn btn-outline" target="_blank">Source Code?</a>
            <a href="https://wa.me/62882008771871" class="btn btn-outline" target="_blank">Contact Dev?</a>
        </div>
    </div>

    <div class="footer">
        &copy; 2026 <span>FR3 NEWERA</span>. All rights reserved.
    </div>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        if (!urlParams.has('qrcode') || !urlParams.has('name')) {
            window.location.replace('?qrcode=https://qris-generator.fr3newera.com&name=Toko+FR3+NEWERA');
        }

        const qrData = urlParams.get('qrcode');
        const nama = urlParams.get('name');

        const canvas = document.getElementById('qrCanvas');
        const ctx = canvas.getContext('2d');
        const backgroundImg = new Image();
        backgroundImg.src = 'baseqr.jpg'; 
        
        backgroundImg.onload = () => {
            canvas.width = backgroundImg.width;
            canvas.height = backgroundImg.height;
            ctx.drawImage(backgroundImg, 0, 0);
            const qr = new QRious({
                value: qrData,
                size: 600,
                level: 'H',
                background: 'white',
                foreground: 'black'
            });

            const qrImg = new Image();
            qrImg.src = qr.toDataURL();
            qrImg.onload = () => {
                const qrX = (canvas.width - qr.size) / 2;
                const qrY = 340;
                ctx.drawImage(qrImg, qrX, qrY);
                ctx.font = 'bold 36px "Segoe UI", Arial, sans-serif';
                ctx.fillStyle = '#FFFFFF';
                ctx.textAlign = 'center';
                
                const textX = canvas.width / 2;
                const textY = canvas.height - 35;
                ctx.shadowColor = "rgba(0,0,0,0.6)";
                ctx.shadowBlur = 4;
                ctx.shadowOffsetX = 1;
                ctx.shadowOffsetY = 1;
                ctx.fillText(`${nama}`, textX, textY);
                ctx.shadowColor = "transparent";
            };
        };

        document.getElementById('downloadBtn').addEventListener('click', function() {
            try {
                const imageURL = canvas.toDataURL("image/png");
                const link = document.createElement('a');
                link.href = imageURL;
                link.download = `QRIS-${nama.replace(/\s+/g, '-')}.png`;
                
                document.body.appendChild(link);
                link.click();
                document.body.removeChild(link);
            } catch (err) {
                alert('Gagal mendownload! Pastikan file baseqr.jpg berada di server/domain yang sama.');
                console.error(err);
            }
        });
    </script>
</body>
</html>
